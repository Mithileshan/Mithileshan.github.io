<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="#101826"/>
  <!-- Subtle accent border -->
  <rect width="40" height="40" rx="10" stroke="#06b6d4" stroke-width="0.75" stroke-opacity="0.4"/>
  <!-- M — left leg (white) -->
  <line x1="8"  y1="32" x2="8"  y2="10" stroke="white"   stroke-width="3" stroke-linecap="round"/>
  <!-- M — left diagonal (cyan) -->
  <line x1="8"  y1="10" x2="20" y2="22" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <!-- M — right diagonal (cyan) -->
  <line x1="20" y1="22" x2="32" y2="10" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>
  <!-- M — right leg (white) -->
  <line x1="32" y1="10" x2="32" y2="32" stroke="white"   stroke-width="3" stroke-linecap="round"/>
</svg>
